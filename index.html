<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achilles Data Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1a33;
    color: white;
    text-align: center;
}

/* Smooth animation */
body {
    animation: fadeIn 1s ease-in;
}
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

.container {
    padding: 20px;
    animation: slideUp 1s ease;
}

@keyframes slideUp {
    from {
        transform: translateY(40px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

h1 {
    font-size: 28px;
}

.card {
    background: #13264a;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
}

button {
    background: #25D366;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    width: 100%;
    font-size: 16px;
    cursor: pointer;
}

/* Floating WhatsApp */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
}
</style>
</head>

<body>

<div class="container">
    <h1>📊 Achilles Data Hub</h1>
    <p>Fast & Cheap Data Bundles</p>

    <!-- 1GB -->
    <div class="card">
        <h2>1GB - GHS 5</h2>
        <button onclick="order('1GB - GHS 5')">Order via WhatsApp</button>
    </div>

    <!-- 2GB -->
    <div class="card">
        <h2>2GB - GHS 10</h2>
        <button onclick="order('2GB - GHS 10')">Order via WhatsApp</button>
    </div>

    <!-- MORE DATA -->
    <div class="card">
        <h2>More Bundles (Up to 50GB)</h2>
        <button onclick="order('Custom Bundle')">Contact on WhatsApp</button>
    </div>
</div>

<!-- Floating Button -->
<a class="whatsapp" href="https://wa.me/233544786372">💬</a>

<script>
function order(bundle) {
    let message = "Hello, I want to order " + bundle;
    window.location.href = "https://wa.me/233544786372?text=" + encodeURIComponent(message);
}
</script>

</body>
</html>
