<!DOCTYPE html>
<html>
<head>
<title>Achilles Data Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* HEADER */
.header {
  background: #020617;
  padding: 20px;
  text-align: center;
  animation: fadeIn 1s ease-in;
}

/* FADE ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(-20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* CARD STYLE */
.card {
  background: #1e293b;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 10px;
  transition: 0.3s;
  animation: fadeIn 1s ease-in;
}

/* HOVER EFFECT */
.card:hover {
  transform: scale(1.03);
  box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

/* BUTTON */
.btn {
  background: #25D366;
  color: white;
  padding: 12px 18px;
  text-decoration: none;
  border-radius: 6px;
  display: inline-block;
  transition: 0.3s;
}

/* BUTTON HOVER */
.btn:hover {
  background: #1ebe5d;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="header">
<h1>📶 Achilles Data Hub</h1>
<p>Cheap & Fast Data Bundles in Ghana</p>
</div>

<div style="padding:20px;">

<h2>MTN Bundles</h2>

<div class="card">
<h3>1GB - GHS 5</h3>
<a href="page2.html" class="btn">Order Now</a>
</div>

<div class="card">
<h3>2GB - GHS 10</h3>
<a href="page2.html" class="btn">Order Now</a>
</div>

</div>

</body>
</html>
