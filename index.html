<!DOCTYPE html>
<html>
<head>
<title>Achilles Data Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a2f;
  color: white;
  text-align: center;
  animation: fadeIn 1.2s ease-in;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.container {
  padding: 20px;
  animation: slideUp 1s ease;
}

@keyframes slideUp {
  from {
    transform: translateY(40px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

h1 {
  margin-top: 20px;
}

.card {
  background: #13294b;
  margin: 15px;
  padding: 20px;
  border-radius: 10px;
}

select, input {
  width: 90%;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #25D366;
  color: white;
  border: none;
  padding: 15px;
  width: 90%;
  border-radius: 10px;
  font-size: 16px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.05);}
  100% {transform: scale(1);}
}

</style>

<script>
function orderNow() {
  var name = document.getElementById("name").value;
  var bundle = document.getElementById("bundle").value;
  var phone = document.getElementById("phone").value;

  var message = "Hello, I want to order:\nName: " + name +
                "\nBundle: " + bundle +
                "\nPhone: " + phone;

  var url = "https://wa.me/233544786372?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}
</script>

</head>

<body>

<div class="container">

<h1>📊 Achilles Data Hub</h1>
<p>Fast & Cheap Data Bundles</p>

<div class="card">

<input type="text" id="name" placeholder="Your Name">

<select id="bundle">
  <option>1GB - GHS 5</option>
  <option>2GB - GHS 10</option>
  <option>5GB - GHS 25</option>
  <option>10GB - GHS 50</option>
  <option>20GB - GHS 100</option>
  <option>30GB - GHS 150</option>
  <option>50GB - GHS 250</option>
</select>

<input type="text" id="phone" placeholder="Phone Number">

<button onclick="orderNow()">Order via WhatsApp</button>

</div>

</div>

</body>
</html>
