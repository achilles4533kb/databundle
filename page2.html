<!DOCTYPE html>
<html>
<head>
<title>Order - Achilles Data Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}
input, select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  border: none;
}
button {
  background: #25D366;
  color: white;
  padding: 15px;
  width: 100%;
  border: none;
  border-radius: 6px;
}
.box {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
</style>

</head>

<body>

<h1>📶 Place Your Order</h1>

<div class="box">
<h3>💳 Step 1: Pay via MTN MoMo</h3>
<p><strong>Number:</strong> 0544786372</p>
<p><strong>Name:</strong> Achilles Data Hub</p>
<p>Send the exact amount before placing order</p>
</div>

<form onsubmit="sendOrder(); return false;">

<input type="text" id="name" placeholder="Your Name" required>

<select id="bundle">
<option>1GB - GHS 5</option>
<option>2GB - GHS 10</option>
</select>

<input type="text" id="number" placeholder="Your Phone Number" required>

<input type="text" id="ref" placeholder="MoMo Reference ID" required>

<button type="submit">Confirm Payment & Order</button>

</form>

<script>
function sendOrder() {
  var name = document.getElementById("name").value;
  var bundle = document.getElementById("bundle").value;
  var number = document.getElementById("number").value;
  var ref = document.getElementById("ref").value;

  var message = "NEW ORDER\n\nName: " + name +
                "\nBundle: " + bundle +
                "\nPhone: " + number +
                "\nMoMo Ref: " + ref;

  var url = "https://wa.me/233544786372?text=" + encodeURIComponent(message);

  window.open(url, '_blank');
}
</script>

</body>
</html>
