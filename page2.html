<!DOCTYPE html>
<html>
<head>
<title>Achilles Data Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a2f;
  color: white;
  text-align: center;
  animation: fadeIn 1.2s ease-in;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.container {
  padding: 20px;
  animation: slideUp 1s ease;
}

@keyframes slideUp {
  from {
    transform: translateY(40px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.card {
  background: #13294b;
  margin: 15px;
  padding: 20px;
  border-radius: 12px;
}

button {
  background: #25D366;
  color: white;
  border: none;
  padding: 15px;
  width: 90%;
  border-radius: 10px;
  font-size: 16px;
  margin-top: 10px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.05);}
  100% {transform: scale(1);}
}
</style>

</head>

<body>

<div class="container">

<h1>📊 Achilles Data Hub</h1>
<p>Fast & Cheap Data Bundles</p>

<div class="card">
<h3>1GB - GHS 5</h3>

<a href="https://YOUR-REAL-DATA-SITE.com" target="_blank">
<button>Buy Now</button>
</a>

</div>

<div class="card">
<h3>2GB - GHS 10</h3>

<a href="https://YOUR-REAL-DATA-SITE.com" target="_blank">
<button>Buy Now</button>
</a>

</div>

<div class="card">
<h3>Need More?</h3>

<a href="https://YOUR-REAL-DATA-SITE.com" target="_blank">
<button>View More Bundles</button>
</a>

</div>

</div>

</body>
</html>
